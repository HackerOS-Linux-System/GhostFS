# ═══════════════════════════════════════════════════════════════════════════════
# GhostFS Calamares Module Descriptors
# ═══════════════════════════════════════════════════════════════════════════════
#
# File layout expected by Calamares:
#
#   /usr/lib/calamares/modules/
#     ghostfs-mkfs/
#       module.desc          ← this section
#       ghostfs_mkfs.py      ← copy from ghostfs_modules.py (run() function)
#     ghostfs-mount/
#       module.desc          ← this section
#       ghostfs_mount.py     ← copy from ghostfs_modules.py (mount_run())
#     ghostfs-umount/
#       module.desc
#       ghostfs_umount.py    ← copy from ghostfs_modules.py (umount_run())
#
# ═══════════════════════════════════════════════════════════════════════════════


# ── ghostfs-mkfs/module.desc ─────────────────────────────────────────────────
# ---
# type:         "job"
# name:         "ghostfs-mkfs"
# interface:    "python"
# script:       "ghostfs_mkfs.py"
# noconfig:     false
# weight:       10
# ─────────────────────────────────────────────────────────────────────────────


# ── ghostfs-mount/module.desc ────────────────────────────────────────────────
# ---
# type:         "job"
# name:         "ghostfs-mount"
# interface:    "python"
# script:       "ghostfs_mount.py"
# noconfig:     true
# weight:       10
# ─────────────────────────────────────────────────────────────────────────────


# ── ghostfs-umount/module.desc ───────────────────────────────────────────────
# ---
# type:         "job"
# name:         "ghostfs-umount"
# interface:    "python"
# script:       "ghostfs_umount.py"
# noconfig:     true
# weight:       10
# ─────────────────────────────────────────────────────────────────────────────


# ═══════════════════════════════════════════════════════════════════════════════
# /etc/calamares/modules/ghostfs-mkfs.conf   (Normal Mode)
# ═══════════════════════════════════════════════════════════════════════════════
---
ghostfsBin:   "/usr/local/bin/ghostfs"
compression:  "zstd"
cybersecMode: false
blockSize:    4096


# ═══════════════════════════════════════════════════════════════════════════════
# /etc/calamares/modules/ghostfs-mkfs.conf   (Cybersec Mode)
# ═══════════════════════════════════════════════════════════════════════════════
---
ghostfsBin:   "/usr/local/bin/ghostfs-cybersec"
compression:  "zstd"
cybersecMode: true
keyDir:       "/etc/ghostfs"
keyFilename:  "key.hex"
blockSize:    4096


# ═══════════════════════════════════════════════════════════════════════════════
# /etc/calamares/settings.conf  — sequence section (complete example)
# ═══════════════════════════════════════════════════════════════════════════════
---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary

  - exec:
      # 1. Standard partition table write (does NOT mkfs — we handle that)
      - partition

      # 2. Format root partition with GhostFS
      - ghostfs-mkfs

      # 3. Mount GhostFS root so the unpacker can write to it
      - ghostfs-mount

      # 4. Copy live system into GhostFS
      - unpackfs

      # 5. Standard post-install modules
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - initramfscfg
      - initramfs          # runs update-initramfs — picks up ghostfs hook
      - grubcfg
      - bootloader

      # 6. Copy the GhostFS key into the installed system (cybersec only)
      # - ghostfs-key-install    ← optional custom module

      # 7. Clean unmount
      - ghostfs-umount

  - show:
      - finished

branding: hackeros
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true


# ═══════════════════════════════════════════════════════════════════════════════
# /etc/calamares/modules/fstab.conf — GhostFS-aware fstab template
# ═══════════════════════════════════════════════════════════════════════════════
---
# Uncomment and adapt the mountOptions block so Calamares generates
# correct options for GhostFS entries.
mountOptions:
  default:  "defaults"
  ghostfs:  "noatime,compression=zstd"

# efiSystemPartition: /boot/efi
# sidebarIcon: flag


# ═══════════════════════════════════════════════════════════════════════════════
# NOTE: After installing HackerOS with GhostFS as the root FS, the installed
# system needs:
#
#   1. ghostfs binary at /usr/local/bin/ghostfs (or in PATH)
#   2. /etc/ghostfs/key.hex (cybersec only, chmod 600)
#   3. initramfs hook at /etc/initramfs-tools/hooks/ghostfs
#   4. initramfs boot script at /etc/initramfs-tools/scripts/local-top/ghostfs-mount
#   5. Kernel command-line: ghostfs.device=/dev/sda1 ghostfs.cybersec=1 (cybersec)
#   6. grub config updated: GRUB_CMDLINE_LINUX="ghostfs.device=/dev/sda1"
#
# All of these are handled by the ghostfs-key-install custom module and the
# initramfs Calamares module when update-initramfs runs with the hook in place.
# ═══════════════════════════════════════════════════════════════════════════════
